<p class="obj-filter__hint">
  Paste or type authorization objects, fields, or values. Separate with newlines, commas, or semicolons.
</p>

<div class="obj-filter__field">
  <label>Authorization Objects</label>
  <textarea nz-input [(ngModel)]="authObjectsText" (input)="onAuthObjectsChange()"
    placeholder="e.g. F_BUCH_BUK&#10;S_TCODE" [nzAutosize]="{ minRows: 3, maxRows: 6 }"></textarea>
  <div class="obj-filter__count" *ngIf="authObjects.length">
    <span nz-icon nzType="check-circle" nzTheme="outline" style="color:#52c41a"></span>
    {{authObjects.length}} parsed
  </div>
</div>

<div class="obj-filter__field">
  <label>Authorization Fields</label>
  <textarea nz-input [(ngModel)]="authFieldsText" (input)="onAuthFieldsChange()"
    placeholder="e.g. ACTVT&#10;BUKRS" [nzAutosize]="{ minRows: 3, maxRows: 6 }"></textarea>
  <div class="obj-filter__count" *ngIf="authFields.length">
    <span nz-icon nzType="check-circle" nzTheme="outline" style="color:#52c41a"></span>
    {{authFields.length}} parsed
  </div>
</div>

<div class="obj-filter__field">
  <label>Field Values</label>
  <textarea nz-input [(ngModel)]="valuesText" (input)="onValuesChange()"
    placeholder="e.g. 01&#10;02&#10;03" [nzAutosize]="{ minRows: 3, maxRows: 6 }"></textarea>
  <div class="obj-filter__count" *ngIf="values.length">
    <span nz-icon nzType="check-circle" nzTheme="outline" style="color:#52c41a"></span>
    {{values.length}} parsed
  </div>
</div>

<div class="obj-filter__match-mode">
  <label>Match Mode</label>
  <nz-radio-group [(ngModel)]="matchMode">
    <label nz-radio nzValue="OR">Match ANY (OR)</label>
    <label nz-radio nzValue="AND">Match ALL (AND)</label>
  </nz-radio-group>
</div>

<div class="obj-filter__summary" *ngIf="hasFilters">
  Total: {{totalFilterCount}} filter values
</div>

<div class="modal-footer">
  <button nz-button nzType="default" (click)="clearAll()" [disabled]="!hasFilters">Clear All</button>
  <button nz-button nzType="primary" (click)="applyFilter()">Apply Filter</button>
</div>
