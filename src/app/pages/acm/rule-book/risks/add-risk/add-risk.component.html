<div style="padding: 16px;">
  <form [formGroup]="form">
    <div nz-row [nzGutter]="16">
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-control>
            <div class="nz-float-label" [class.has-value]="form.get('name')?.value">
              <input nz-input placeholder=" " formControlName="name" />
              <label>Risk Name</label>
            </div>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-control>
            <div class="nz-float-label" [class.has-value]="form.get('systemType')?.value">
              <nz-select formControlName="systemType" nzPlaceHolder=" " nzShowSearch>
                <nz-option *ngFor="let item of systemTypeList" [nzValue]="item" [nzLabel]="item"></nz-option>
              </nz-select>
              <label>System Type</label>
            </div>
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>

    <div nz-row [nzGutter]="16">
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-control>
            <div class="nz-float-label" [class.has-value]="form.get('riskDescription')?.value">
              <input nz-input placeholder=" " formControlName="riskDescription" />
              <label>Risk Description</label>
            </div>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-control>
            <div class="nz-float-label" [class.has-value]="form.get('riskLevel')?.value">
              <nz-select formControlName="riskLevel" nzPlaceHolder=" " nzShowSearch>
                <nz-option *ngFor="let item of riskLevelsList" [nzValue]="item" [nzLabel]="item"></nz-option>
              </nz-select>
              <label>Risk Level</label>
            </div>
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>

    <div nz-row [nzGutter]="16">
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-control>
            <div class="nz-float-label" [class.has-value]="form.get('riskTypeId')?.value">
              <nz-select formControlName="riskTypeId" nzPlaceHolder=" " nzShowSearch>
                <nz-option *ngFor="let rt of riskTypes" [nzValue]="rt.id" [nzLabel]="rt.name"></nz-option>
              </nz-select>
              <label>Risk Type</label>
            </div>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-control>
            <div class="nz-float-label has-value">
              <nz-select formControlName="crossSystem" nzPlaceHolder=" ">
                <nz-option [nzValue]="true" nzLabel="Yes"></nz-option>
                <nz-option [nzValue]="false" nzLabel="No"></nz-option>
              </nz-select>
              <label>Is Cross System?</label>
            </div>
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>

    <div nz-row [nzGutter]="16">
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-control>
            <div class="nz-float-label" [class.has-value]="form.get('businessProcessId')?.value">
              <nz-select formControlName="businessProcessId" nzPlaceHolder=" " nzShowSearch
                (ngModelChange)="onBusinessProcessChange($event)">
                <nz-option *ngFor="let bp of businessProcesses" [nzValue]="bp.id" [nzLabel]="bp.name"></nz-option>
              </nz-select>
              <label>Business Process</label>
            </div>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-control>
            <div class="nz-float-label" [class.has-value]="form.get('subProcId')?.value">
              <nz-select formControlName="subProcId" nzPlaceHolder=" " nzShowSearch>
                <nz-option *ngFor="let sp of businessSubProcesses" [nzValue]="sp.id" [nzLabel]="sp.name"></nz-option>
              </nz-select>
              <label>Business Sub Process</label>
            </div>
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>

    <nz-form-item>
      <nz-form-control>
        <div class="nz-float-label" [class.has-value]="form.get('detailDesc')?.value">
          <textarea nz-input placeholder=" " formControlName="detailDesc"
            [nzAutosize]="{minRows: 2, maxRows: 6}" maxlength="200"></textarea>
          <label>Detail Description</label>
        </div>
        <div *ngIf="form.get('detailDesc')?.value" style="font-size: 11px; color: rgba(0,0,0,0.35); margin-top: 2px;">
          {{form.get('detailDesc')?.value?.length || 0}}/200
        </div>
      </nz-form-control>
    </nz-form-item>
  </form>
</div>
<div class="modal-footer">
  <button nz-button nzType="default" (click)="modalRef.close()">Close</button>
  <button nz-button nzType="primary" (click)="save()">Save</button>
</div>
