<nz-spin [nzSpinning]="rulesLoading">
  <!-- Rules table with native expand -->
  <nz-table #rulesTable [nzData]="rulesData" nzSize="small" [nzShowPagination]="rulesData.length > 10"
    [nzPageSize]="10" nzTableLayout="fixed" [nzFrontPagination]="true"
    [nzScroll]="{ y: '280px' }">
    <thead>
      <tr>
        <th nzWidth="40px"></th>
        <th nzWidth="130px">Rule ID</th>
        <th>Description</th>
        <th nzWidth="140px">Business Process</th>
        <th nzWidth="120px">Sub Process</th>
        <th nzWidth="90px">Type</th>
      </tr>
    </thead>
    <tbody>
      <ng-container *ngFor="let row of rulesTable.data">
        <tr>
          <td [nzExpand]="selectedRule?.id === row.id" (nzExpandChange)="toggleRule(row)"></td>
          <td>{{row.ruleName}}</td>
          <td>{{row.ruleDescription}}</td>
          <td>{{row.businessProcessName}}</td>
          <td>{{row.subProcName}}</td>
          <td>{{row.ruleTypeName}}</td>
        </tr>
        <tr [nzExpand]="selectedRule?.id === row.id">
          <nz-spin [nzSpinning]="objectsLoading" nzSize="small">
            <nz-table #objectsTable [nzData]="ruleObjects" nzSize="small" [nzShowPagination]="false"
              nzTableLayout="fixed" [nzFrontPagination]="false"
              [nzScroll]="{ y: '200px' }">
              <thead>
                <tr>
                  <th nzWidth="160px">Object</th>
                  <th nzWidth="160px">Field Name</th>
                  <th>Value</th>
                  <th nzWidth="100px">Join By AND</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let obj of objectsTable.data">
                  <td>{{obj.name}}</td>
                  <td>{{obj.fieldName}}</td>
                  <td>{{obj.fieldValue}}</td>
                  <td>
                    <nz-tag [nzColor]="obj.joinByAnd ? 'success' : 'error'">
                      {{obj.joinByAnd ? 'Yes' : 'No'}}
                    </nz-tag>
                  </td>
                </tr>
              </tbody>
            </nz-table>
            <nz-empty *ngIf="!objectsLoading && !ruleObjects.length"
              nzNotFoundContent="No objects found for this rule" [nzNotFoundImage]="'simple'">
            </nz-empty>
          </nz-spin>
        </tr>
      </ng-container>
    </tbody>
  </nz-table>

  <nz-empty *ngIf="!rulesLoading && !rulesData.length"
    nzNotFoundContent="No rules mapped to this risk" [nzNotFoundImage]="'simple'">
  </nz-empty>
</nz-spin>
