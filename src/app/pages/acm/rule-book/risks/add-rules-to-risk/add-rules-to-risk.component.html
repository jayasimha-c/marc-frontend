<!-- Cross-system notice -->
<nz-alert *ngIf="isCrossSystem" nzType="info" nzBanner
  nzMessage="Cross-System Risk: Please assign a target system to each rule."
  style="margin-bottom: 12px;"></nz-alert>

<div style="padding: 16px;">
  <div nz-row [nzGutter]="16">
    <!-- Available Rules (left) -->
    <div nz-col [nzSpan]="12">
      <nz-card nzSize="small" [nzTitle]="'Available Rules (' + availableRules.length + ')'" [nzExtra]="availableActions">
        <ng-template #availableActions>
          <nz-space nzSize="small">
            <button *nzSpaceItem nz-button nzSize="small" nzType="primary" (click)="addSelected()" nz-tooltip="Add Selected">
              <span nz-icon nzType="right" nzTheme="outline"></span> Add
            </button>
            <button *nzSpaceItem nz-button nzSize="small" (click)="addAll()" nz-tooltip="Add All">
              <span nz-icon nzType="double-right" nzTheme="outline"></span> All
            </button>
            <button *nzSpaceItem nz-button nzSize="small" (click)="loadAvailable()" nz-tooltip="Refresh">
              <span nz-icon nzType="reload" nzTheme="outline"></span>
            </button>
          </nz-space>
        </ng-template>

        <nz-input-group nzSize="small" [nzPrefix]="searchIcon" style="margin-bottom: 8px;">
          <input nz-input nzSize="small" placeholder="Search rules..." [(ngModel)]="searchText" (ngModelChange)="filterRules()">
        </nz-input-group>
        <ng-template #searchIcon><span nz-icon nzType="search"></span></ng-template>

        <nz-spin [nzSpinning]="availableLoading">
          <nz-table #availableTable
            [nzData]="filteredAvailableRules"
            nzSize="small"
            nzTableLayout="fixed"
            [nzShowPagination]="availableRules.length > 10"
            [nzPageSize]="10"
            [nzFrontPagination]="true"
            [nzScroll]="{ y: '400px' }">
            <thead>
              <tr>
                <th nzWidth="40px" [nzChecked]="availableAllChecked" [nzIndeterminate]="availableIndeterminate"
                  (nzCheckedChange)="onAvailableAllChecked($event)"></th>
                <th *ngFor="let col of availableColumns" [nzWidth]="col.width || null">{{col.header}}</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let row of availableTable.data">
                <td [nzChecked]="setOfAvailableChecked.has(row.id)"
                  (nzCheckedChange)="onAvailableChecked(row.id, $event)"></td>
                <td *ngFor="let col of availableColumns">{{row[col.field]}}</td>
              </tr>
            </tbody>
          </nz-table>
        </nz-spin>
      </nz-card>
    </div>

    <!-- Right side: Selected rules + Risk Condition + Group Builder -->
    <div nz-col [nzSpan]="12">

      <!-- Selected Rules as tags -->
      <nz-card nzSize="small" [nzTitle]="'Selected Rules (' + selectedRules.length + ')'" [nzExtra]="removeAllBtn">
        <ng-template #removeAllBtn>
          <button nz-button nzSize="small" nzDanger (click)="removeAllRules()" *ngIf="selectedRules.length"
            nz-tooltip="Remove All">
            <span nz-icon nzType="delete" nzTheme="outline"></span> Clear
          </button>
        </ng-template>
        <nz-tag *ngFor="let r of selectedRules" nzMode="closeable" nzColor="blue"
          (nzOnClose)="removeRule(r)">
          {{r.ruleName}}
        </nz-tag>
        <span *ngIf="!selectedRules.length" nz-typography nzType="secondary" style="font-size: 12px;">
          Select rules from the left table
        </span>

        <!-- Cross-system: target system per rule -->
        <nz-list *ngIf="isCrossSystem && selectedRules.length" nzSize="small" style="margin-top: 8px;">
          <nz-list-item *ngFor="let r of selectedRules">
            <span>{{r.ruleName}}</span>
            <nz-select nzSize="small" [ngModel]="systemMap[r.id] || null"
              (ngModelChange)="onSystemChange(r.id, $event)" nzPlaceHolder="Target system"
              style="width: 160px;">
              <nz-option *ngFor="let sys of availableSystems" [nzValue]="sys.id" [nzLabel]="sys.destinationName"></nz-option>
            </nz-select>
          </nz-list-item>
        </nz-list>
      </nz-card>

      <!-- Risk Condition -->
      <nz-form-item style="margin-top: 12px; margin-bottom: 8px;">
        <nz-form-label>Risk Condition</nz-form-label>
        <nz-form-control>
          <nz-select [(ngModel)]="selectedConditionId" (ngModelChange)="onConditionChange($event)">
            <nz-option *ngFor="let c of riskConditions" [nzValue]="c.id" [nzLabel]="c.name"></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>

      <!-- Visual Group Builder (when "Other" selected) -->
      <ng-container *ngIf="rcSelection === 'OTHER'">
        <ng-container *ngFor="let group of conditionGroups; let gi = index; let last = last">
          <nz-card nzSize="small" [nzTitle]="'Group ' + (gi + 1)" [nzExtra]="groupActions" style="margin-bottom: 4px;">
            <ng-template #groupActions>
              <nz-space nzSize="small">
                <button *nzSpaceItem nz-button nzSize="small" nzType="default"
                  (click)="toggleGroupOperator(gi)"
                  nz-tooltip="Toggle join operator within this group">
                  {{group.operator}}
                </button>
                <button *nzSpaceItem nz-button nzSize="small" nzType="text" nzDanger
                  (click)="removeGroup(gi)" nz-tooltip="Remove group"
                  [disabled]="conditionGroups.length <= 1">
                  <span nz-icon nzType="delete" nzTheme="outline"></span>
                </button>
              </nz-space>
            </ng-template>
            <nz-tag *ngFor="let rn of group.ruleNames" nzMode="closeable" nzColor="blue"
              (nzOnClose)="removeRuleFromGroup(rn, gi)">
              {{rn}}
            </nz-tag>
            <nz-tag *ngFor="let r of unassignedRules" nzColor="default" style="cursor: pointer; border-style: dashed;"
              (click)="addRuleToGroup(r, gi)" nz-tooltip="Click to add to this group">
              {{r}} <span nz-icon nzType="plus" nzTheme="outline" style="font-size: 10px;"></span>
            </nz-tag>
            <span *ngIf="!group.ruleNames.length && !unassignedRules.length" nz-typography nzType="secondary" style="font-size: 12px;">
              No rules available
            </span>
          </nz-card>

          <!-- Inter-group operator -->
          <div *ngIf="!last" style="text-align: center; padding: 2px 0;">
            <button nz-button nzSize="small" nzShape="round" nzType="dashed"
              (click)="toggleInterGroupOperator()"
              nz-tooltip="Toggle operator between groups">
              {{interGroupOperator}}
            </button>
          </div>
        </ng-container>

        <button nz-button nzType="dashed" nzSize="small" nzBlock (click)="addGroup()" style="margin-top: 8px;">
          <span nz-icon nzType="plus" nzTheme="outline"></span> Add Group
        </button>

        <!-- Generated expression preview -->
        <nz-alert *ngIf="rCondition" nzType="success" [nzMessage]="expressionTpl" nzShowIcon style="margin-top: 8px;"></nz-alert>
        <ng-template #expressionTpl>
          <span style="font-size: 12px;">Expression: <code>{{rCondition}}</code></span>
        </ng-template>
      </ng-container>
    </div>
  </div>
</div>

<!-- Validation -->
<nz-alert *ngIf="validationErrors.length" nzType="warning" [nzMessage]="validationTpl" nzBanner></nz-alert>
<ng-template #validationTpl>
  <span *ngFor="let err of validationErrors; let last = last">{{err}}<span *ngIf="!last"> &middot; </span></span>
</ng-template>

<div class="modal-footer">
  <button nz-button nzType="default" (click)="modalRef.close()">Close</button>
  <button nz-button nzType="primary" (click)="save()" [disabled]="validationErrors.length > 0">Save</button>
</div>
