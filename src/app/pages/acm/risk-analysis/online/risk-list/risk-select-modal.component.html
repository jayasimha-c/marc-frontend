<div style="padding: 0 16px;">
  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
    <span style="font-weight: 600;">Available Risks</span>
    <nz-button-group>
      <button nz-button nzSize="small" nzType="primary" [disabled]="selectedItems.length === 0" (click)="saveSelected()">
        <span nz-icon nzType="check" nzTheme="outline"></span> Add Selected
      </button>
      <button nz-button nzSize="small" (click)="saveAll()">
        <span nz-icon nzType="double-right" nzTheme="outline"></span> Add All
      </button>
      <button nz-button nzSize="small" (click)="loadData()">
        <span nz-icon nzType="reload" nzTheme="outline"></span>
      </button>
    </nz-button-group>
  </div>

  <nz-input-group nzSize="small" [nzSuffix]="riskModalSearchIcon" style="margin-bottom: 8px; max-width: 280px;">
    <input nz-input placeholder="Search risks..." [(ngModel)]="searchText" (ngModelChange)="applyFilter()" />
  </nz-input-group>
  <ng-template #riskModalSearchIcon>
    <span nz-icon nzType="search"></span>
  </ng-template>

  <nz-table #selectRiskTable [nzData]="displayItems" nzSize="small"
            [nzFrontPagination]="true"
            nzTableLayout="fixed"
            [nzScroll]="{ y: '50vh' }">
    <thead>
      <tr>
        <th nzWidth="40px" [nzChecked]="allChecked" (nzCheckedChange)="onAllChecked($event)"></th>
        <th>Risk ID</th>
        <th>Description</th>
        <th>Business Process</th>
        <th>Sub Process</th>
        <th>Risk Type</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of selectRiskTable.data">
        <td [nzChecked]="isChecked(row)" (nzCheckedChange)="onItemChecked(row, $event)"></td>
        <td style="color: #1890ff;">{{ row.name }}</td>
        <td>{{ row.riskDescription }}</td>
        <td>{{ row.businessProcess?.name }}</td>
        <td>{{ row.businessProcess?.subProcessNames }}</td>
        <td>{{ row.riskType?.name }}</td>
      </tr>
    </tbody>
  </nz-table>
</div>
<div class="modal-footer">
  <button nz-button nzType="default" (click)="modal.close()">Close</button>
</div>
