<div style="padding: 0 16px;">
  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
    <span style="font-weight: 600;">Available Users</span>
    <nz-button-group>
      <button nz-button nzSize="small" nzType="primary" [disabled]="selectedItems.length === 0" (click)="saveSelected()">
        <span nz-icon nzType="check" nzTheme="outline"></span> Add Selected
      </button>
      <button nz-button nzSize="small" (click)="saveAll()">
        <span nz-icon nzType="double-right" nzTheme="outline"></span> Add All
      </button>
      <button nz-button nzSize="small" (click)="loadData()">
        <span nz-icon nzType="reload" nzTheme="outline"></span>
      </button>
    </nz-button-group>
  </div>

  <div style="display: flex; gap: 12px;">
    <!-- Left: Filter Panel (25%) -->
    <div style="flex: 0 0 25%; min-width: 200px; border: 1px solid #d9d9d9; border-radius: 4px; padding: 12px; background: #fafafa;">
      <div style="font-weight: 500; margin-bottom: 8px; font-size: 13px;">Filters</div>

      <div style="margin-bottom: 12px;">
        <label style="display: block; font-size: 12px; color: #595959; margin-bottom: 4px;">User IDs</label>
        <textarea nz-input
                  [(ngModel)]="bulkUserIdsText"
                  (ngModelChange)="onBulkUserIdsChange()"
                  placeholder="Paste user IDs (one per line, comma or semicolon separated)"
                  [nzAutosize]="{ minRows: 4, maxRows: 10 }"
                  style="font-size: 12px; font-family: monospace;">
        </textarea>
        <div *ngIf="bulkUserIds.length > 0" style="font-size: 11px; color: #52c41a; margin-top: 2px;">
          &#10003; {{ bulkUserIds.length }} parsed
        </div>
      </div>

      <div style="margin-bottom: 12px;">
        <label style="display: block; font-size: 12px; color: #595959; margin-bottom: 4px;">User Group</label>
        <input nz-input nzSize="small" [(ngModel)]="filterGroup" placeholder="e.g. FIACNT" (keyup.enter)="applyFilters()" />
      </div>

      <div style="margin-bottom: 12px;">
        <label style="display: block; font-size: 12px; color: #595959; margin-bottom: 4px;">User Type</label>
        <input nz-input nzSize="small" [(ngModel)]="filterType" placeholder="e.g. A, B, C" (keyup.enter)="applyFilters()" />
      </div>

      <div style="display: flex; gap: 8px;">
        <button nz-button nzSize="small" (click)="clearFilters()">Clear</button>
        <button nz-button nzSize="small" nzType="primary" (click)="applyFilters()">Apply</button>
      </div>
    </div>

    <!-- Right: Users Table (75%) -->
    <div style="flex: 1; min-width: 0;">
      <nz-input-group nzSize="small" [nzSuffix]="userModalSearchIcon" style="margin-bottom: 8px; max-width: 280px;">
        <input nz-input placeholder="Search users..." [(ngModel)]="searchText" (keyup.enter)="onSearch()" />
      </nz-input-group>
      <ng-template #userModalSearchIcon>
        <span nz-icon nzType="search" style="cursor: pointer;" (click)="onSearch()"></span>
      </ng-template>

      <nz-table #selectUserTable [nzData]="items" nzSize="small"
                [nzFrontPagination]="false"
                [nzTotal]="totalRecords"
                [nzPageIndex]="currentPage"
                [nzPageSize]="pageSize"
                (nzPageIndexChange)="onPageChange($event)"
                nzTableLayout="fixed"
                [nzScroll]="{ x: '900px', y: '50vh' }">
        <thead>
          <tr>
            <th nzWidth="40px" [nzChecked]="allChecked" (nzCheckedChange)="onAllChecked($event)"></th>
            <th nzWidth="120px" [nzLeft]="true">User ID</th>
            <th nzWidth="160px">Name</th>
            <th nzWidth="80px">Type</th>
            <th nzWidth="120px">Group</th>
            <th nzWidth="80px">Lock</th>
            <th nzWidth="120px">Valid To</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of selectUserTable.data">
            <td [nzChecked]="isChecked(row)" (nzCheckedChange)="onItemChecked(row, $event)"></td>
            <td [nzLeft]="true" style="color: #1890ff;">{{ row.bname }}</td>
            <td>{{ row.userName }}</td>
            <td>{{ row.ustyp }}</td>
            <td>{{ row.clas }}</td>
            <td>{{ row.uflag }}</td>
            <td>{{ row.gltgbInDateFmt }}</td>
          </tr>
        </tbody>
      </nz-table>
    </div>
  </div>
</div>
<div class="modal-footer">
  <button nz-button nzType="default" (click)="modal.close()">Close</button>
</div>
