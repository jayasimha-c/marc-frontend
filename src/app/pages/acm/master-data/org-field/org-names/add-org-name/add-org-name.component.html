<form [formGroup]="form">
  <nz-form-item>
    <div class="nz-float-label" [class.has-value]="form.get('orgName')?.value">
      <input nz-input placeholder=" " formControlName="orgName" autocomplete="off" />
      <label>ORG Name</label>
    </div>
    <span style="color: #ff4d4f; font-size: 12px;" *ngIf="form.get('orgName')?.invalid && form.get('orgName')?.touched">
      ORG Name is required
    </span>
  </nz-form-item>

  <nz-form-item>
    <div class="nz-float-label" [class.has-value]="form.get('description')?.value">
      <input nz-input placeholder=" " formControlName="description" autocomplete="off" />
      <label>Description</label>
    </div>
    <span style="color: #ff4d4f; font-size: 12px;" *ngIf="form.get('description')?.invalid && form.get('description')?.touched">
      Description is required
    </span>
  </nz-form-item>
</form>

<div class="modal-footer">
  <button nz-button nzType="default" (click)="modal.close()">Close</button>
  <button nz-button nzType="primary" (click)="save()" [disabled]="isSaving">
    {{ isSaving ? 'Saving...' : 'Save' }}
  </button>
</div>
