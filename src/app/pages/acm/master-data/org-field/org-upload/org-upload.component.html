<app-page-panel header="Organization Fields Upload">
  <nz-alert nzType="warning" nzShowIcon nzMessage="Important Notes" [nzDescription]="warningDesc"
            style="margin-bottom: 16px"></nz-alert>
  <ng-template #warningDesc>
    <ul style="margin: 0; padding-left: 16px">
      <li>SAP system selection is required before upload</li>
      <li>Data will be imported to the selected system</li>
      <li>Backup existing data before importing</li>
    </ul>
  </ng-template>

  <nz-card nzTitle="System Selection &amp; Template" style="margin-bottom: 16px">
    <nz-row [nzGutter]="24">
      <nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label>SAP System</nz-form-label>
          <nz-form-control>
            <nz-select [(ngModel)]="selectedSapSystem" nzPlaceHolder="Select SAP System" nzShowSearch nzAllowClear>
              <nz-option *ngFor="let sys of sapSystemList" [nzValue]="sys.id" [nzLabel]="sys.destinationName"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </nz-col>
      <nz-col [nzSpan]="12" style="display: flex; align-items: center">
        <button nz-button (click)="downloadTemplate()">
          <span nz-icon nzType="download"></span> Download Template
        </button>
      </nz-col>
    </nz-row>
  </nz-card>

  <nz-card nzTitle="Upload File">
    <nz-upload [nzBeforeUpload]="beforeUpload" [nzAccept]="'.xlsx,.xls'" [nzShowUploadList]="false">
      <button nz-button nzType="primary" [disabled]="!selectedSapSystem" [nzLoading]="uploadProgress">
        <span nz-icon nzType="upload"></span> Choose File
      </button>
    </nz-upload>
    <nz-tag *ngIf="uploadSuccess" nzColor="success" style="margin-left: 8px">
      <span nz-icon nzType="check-circle"></span> Upload successful
    </nz-tag>

    <nz-alert nzType="info" nzShowIcon nzMessage="Supported formats: Excel (.xlsx, .xls). Max size: 10MB."
              style="margin-top: 16px"></nz-alert>
  </nz-card>
</app-page-panel>
