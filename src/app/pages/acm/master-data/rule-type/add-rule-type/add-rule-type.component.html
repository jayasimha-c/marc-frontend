<nz-form-item>
  <div class="nz-float-label" [class.has-value]="ruleType">
    <input nz-input placeholder=" " [(ngModel)]="ruleType" [ngModelOptions]="{standalone: true}" autocomplete="off" />
    <label>Rule Type</label>
  </div>
</nz-form-item>

<div class="modal-footer">
  <button nz-button nzType="default" (click)="modal.close()">Close</button>
  <button nz-button nzType="primary" (click)="save()" [disabled]="isSaving">
    {{ isSaving ? 'Saving...' : 'Save' }}
  </button>
</div>
