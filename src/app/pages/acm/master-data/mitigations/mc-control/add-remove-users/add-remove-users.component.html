<nz-spin [nzSpinning]="loading">
  <div nz-row [nzGutter]="16">
    <!-- LEFT: Available Users -->
    <div nz-col [nzSpan]="12">
      <nz-card nzSize="small" nzTitle="Available Users" style="min-height: 400px;">
        <nz-table #availTable [nzData]="availableUsers" nzSize="small"
          [nzShowPagination]="availableUsers.length > 15" [nzPageSize]="15"
          nzTableLayout="fixed" [nzFrontPagination]="true" [nzScroll]="{ y: '300px' }">
          <thead>
            <tr>
              <th nzWidth="40px" [nzChecked]="availableCheckAll" [nzIndeterminate]="availableIndeterminate"
                (nzCheckedChange)="onAvailableAllChecked($event)"></th>
              <th>User ID</th>
              <th>First Name</th>
              <th>Last Name</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of availTable.data">
              <td [nzChecked]="checkedAvailable.has(row.userNameVO?.bname || row.bname)"
                (nzCheckedChange)="onAvailableItemChecked(row.userNameVO?.bname || row.bname, $event)"></td>
              <td>{{ row.userNameVO?.bname || row.bname }}</td>
              <td>{{ row.userNameVO?.firstName || row.firstName }}</td>
              <td>{{ row.userNameVO?.lastName || row.lastName }}</td>
            </tr>
          </tbody>
        </nz-table>
        <button nz-button nzType="primary" nzSize="small" style="margin-top: 8px;"
          [disabled]="checkedAvailable.size === 0" (click)="addSelected()">
          <span nz-icon nzType="double-right" nzTheme="outline"></span> Add Selected ({{ checkedAvailable.size }})
        </button>
      </nz-card>
    </div>

    <!-- RIGHT: Selected Users -->
    <div nz-col [nzSpan]="12">
      <nz-card nzSize="small" nzTitle="Selected Users" style="min-height: 400px;">
        <nz-table #selTable [nzData]="selectedUsers" nzSize="small"
          [nzShowPagination]="selectedUsers.length > 15" [nzPageSize]="15"
          nzTableLayout="fixed" [nzFrontPagination]="true" [nzScroll]="{ y: '300px' }">
          <thead>
            <tr>
              <th nzWidth="40px" [nzChecked]="selectedCheckAll" [nzIndeterminate]="selectedIndeterminate"
                (nzCheckedChange)="onSelectedAllChecked($event)"></th>
              <th>User ID</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th nzWidth="120px">From Date</th>
              <th nzWidth="120px">To Date</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of selTable.data">
              <td [nzChecked]="checkedSelected.has(row.userId)"
                (nzCheckedChange)="onSelectedItemChecked(row.userId, $event)"></td>
              <td>{{ row.userId }}</td>
              <td>{{ row.firstName }}</td>
              <td>{{ row.lastName }}</td>
              <td>
                <input nz-input nzSize="small" type="date" [(ngModel)]="row.startDateStr" style="width: 110px;" />
              </td>
              <td>
                <input nz-input nzSize="small" type="date" [(ngModel)]="row.endDateStr" style="width: 110px;" />
              </td>
            </tr>
          </tbody>
        </nz-table>
        <button nz-button nzDanger nzSize="small" style="margin-top: 8px;"
          [disabled]="checkedSelected.size === 0" (click)="removeSelected()">
          <span nz-icon nzType="double-left" nzTheme="outline"></span> Remove Selected ({{ checkedSelected.size }})
        </button>
      </nz-card>
    </div>
  </div>
</nz-spin>

<div class="modal-footer">
  <button nz-button nzType="default" (click)="modalRef.close()">Close</button>
  <button nz-button nzType="primary" (click)="save()">Save</button>
</div>
