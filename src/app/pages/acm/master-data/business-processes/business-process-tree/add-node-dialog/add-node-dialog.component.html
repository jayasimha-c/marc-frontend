<form [formGroup]="form">
  <!-- Parent Process Info (for sub-process) -->
  <nz-alert *ngIf="parentProcessName" nzType="info" [nzShowIcon]="true"
    [nzMessage]="'Parent Process: ' + parentProcessName"
    style="margin-bottom: 16px;">
  </nz-alert>

  <!-- Name Field -->
  <nz-form-item>
    <div class="nz-float-label" [class.has-value]="form.get('name')?.value">
      <input nz-input formControlName="name" placeholder=" " maxlength="50" autocomplete="off" />
      <label>{{ data.nodeType === 'process' ? 'Process Name' : 'Sub-Process Name' }}</label>
    </div>
    <div style="display: flex; justify-content: space-between; font-size: 12px; margin-top: 4px;">
      <span style="color: #ff4d4f;" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
        <span *ngIf="form.get('name')?.hasError('required')">Name is required</span>
        <span *ngIf="form.get('name')?.hasError('maxlength')">Name cannot exceed 50 characters</span>
      </span>
      <span style="color: #999; margin-left: auto;">{{ form.get('name')?.value?.length || 0 }}/50</span>
    </div>
  </nz-form-item>
</form>

<div class="modal-footer">
  <button nz-button nzType="default" (click)="modal.close()">Close</button>
  <button nz-button nzType="primary" (click)="save()" [disabled]="isSaving || form.invalid">
    {{ data.mode === 'add' ? 'Add' : 'Save' }}
  </button>
</div>
