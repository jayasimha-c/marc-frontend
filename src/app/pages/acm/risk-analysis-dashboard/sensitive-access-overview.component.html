<nz-spin [nzSpinning]="loading">
  <div nz-row [nzGutter]="[16, 16]">
    <div nz-col nzXs="24" nzSm="12" nzMd="6">
      <app-statistics-card title="Total Sensitive Access" [value]="totalSensitive"
                           icon="key" color="#1890ff" [loading]="loading"></app-statistics-card>
    </div>
    <div nz-col nzXs="24" nzSm="12" nzMd="6">
      <app-statistics-card title="Critical Access Users" [value]="criticalAccess"
                           icon="warning" color="#f5222d" [loading]="loading"></app-statistics-card>
    </div>
    <div nz-col nzXs="24" nzSm="12" nzMd="6">
      <app-statistics-card title="Pending Reviews" [value]="pendingReviews"
                           icon="clock-circle" color="#faad14" [loading]="loading"></app-statistics-card>
    </div>
    <div nz-col nzXs="24" nzSm="12" nzMd="6">
      <app-statistics-card title="Review Compliance" [value]="reviewCompliance"
                           icon="check-circle" color="#52c41a" [loading]="loading"></app-statistics-card>
    </div>
  </div>

  <div nz-row [nzGutter]="[16, 16]" style="margin-top: 16px">
    <div nz-col nzXs="24" nzMd="12">
      <common-apx-chart [chartOptions]="accessDistributionChart" [loading]="loading" size="md"></common-apx-chart>
    </div>
    <div nz-col nzXs="24" nzMd="12">
      <common-apx-chart [chartOptions]="accessTrendsChart" [loading]="loading" size="md"></common-apx-chart>
    </div>
  </div>

  <div style="margin-top: 16px">
    <app-advanced-table
      [showColumnSettings]="true"
      storageKey="acm-risk-analysis-dashboard-sensitive-access-overview"
      title="Recent Sensitive Access Activity"
      [columns]="gridColumns"
      [data]="gridData"
      [loading]="gridLoading"
      [serverSide]="true"
      [totalRecords]="gridTotal"
      [defaultPageSize]="20"
      [showSearch]="false"
      [showRefresh]="false"
      size="small"
      (queryParamsChange)="onGridQueryChange($event)">
    </app-advanced-table>
  </div>
</nz-spin>
