<nz-card nzTitle="Data Synchronization">
  <nz-tabset [nzSelectedIndex]="activeTab" (nzSelectChange)="onTabChange($event)" [nzAnimated]="false">
    <nz-tab *ngFor="let tab of tabs" [nzTitle]="tabTitle">
      <ng-template #tabTitle>
        <span nz-icon [nzType]="tab.icon" nzTheme="outline" class="ds__tab-icon"></span>
        {{tab.label}}
      </ng-template>
    </nz-tab>
  </nz-tabset>

  <router-outlet></router-outlet>
</nz-card>
