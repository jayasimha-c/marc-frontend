<nz-card nzTitle="OAuth2 Management">
  <nz-tabset (nzSelectChange)="onTabChange($event.index)">

    <nz-tab nzTitle="Clients">
      <app-advanced-table
        [showColumnSettings]="true"
        storageKey="admin-authentication-oauth2-1"
        [columns]="clientColumns"
        [data]="clientsData"
        [actions]="clientActions"
        [loading]="clientsLoading"
        [showSearch]="true"
        [showPagination]="true"
        size="middle"
        (refresh)="loadClients()"
        (rowClick)="onClientRowClick($event)">
      </app-advanced-table>
    </nz-tab>

    <nz-tab nzTitle="Scopes">
      <app-advanced-table
        [showColumnSettings]="true"
        storageKey="admin-authentication-oauth2-2"
        [columns]="scopeColumns"
        [data]="scopesData"
        [actions]="scopeActions"
        [loading]="scopesLoading"
        [showSearch]="true"
        [showPagination]="true"
        size="middle"
        (refresh)="loadScopes()"
        (rowClick)="onScopeRowClick($event)">
      </app-advanced-table>
    </nz-tab>

    <nz-tab nzTitle="Tokens">
      <app-advanced-table
        [showColumnSettings]="true"
        storageKey="admin-authentication-oauth2-3"
        [columns]="tokenColumns"
        [data]="tokensData"
        [actions]="tokenActions"
        [loading]="tokensLoading"
        [showSearch]="true"
        [showPagination]="true"
        size="middle"
        (refresh)="loadTokens()"
        (rowClick)="onTokenRowClick($event)">
      </app-advanced-table>
    </nz-tab>

    <nz-tab nzTitle="Audit Logs">
      <app-advanced-table
        [showColumnSettings]="true"
        storageKey="admin-authentication-oauth2-4"
        [columns]="auditColumns"
        [data]="auditData"
        [loading]="auditLoading"
        [showSearch]="true"
        [showPagination]="true"
        size="middle"
        (refresh)="loadAuditLogs()">
      </app-advanced-table>
    </nz-tab>

  </nz-tabset>
</nz-card>
