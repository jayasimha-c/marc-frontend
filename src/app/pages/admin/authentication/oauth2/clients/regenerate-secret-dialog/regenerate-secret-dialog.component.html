<div style="display: flex; align-items: flex-start; gap: 8px; padding: 12px; margin-bottom: 16px; border-radius: 4px; background: rgba(250, 173, 20, 0.1); border: 1px solid rgba(250, 173, 20, 0.3);">
  <span nz-icon nzType="warning" nzTheme="outline" style="color: #faad14; margin-top: 2px;"></span>
  <span><strong>Important:</strong> This is the only time you will see this secret. Please copy and store it securely.</span>
</div>

<nz-form-item>
  <nz-form-control>
    <div class="nz-float-label has-value">
      <nz-input-group [nzSuffix]="copyBtn">
        <input nz-input placeholder=" " [value]="data.secret" readonly />
      </nz-input-group>
      <label>New Client Secret for {{ data.clientName }}</label>
    </div>
    <ng-template #copyBtn>
      <button nz-button nzType="text" nzShape="circle" (click)="copySecret()" nz-tooltip nzTooltipTitle="Copy to clipboard">
        <span nz-icon nzType="copy" nzTheme="outline"></span>
      </button>
    </ng-template>
  </nz-form-control>
</nz-form-item>

<div class="modal-footer">
  <button nz-button nzType="primary" (click)="modal.close()">Close</button>
</div>
