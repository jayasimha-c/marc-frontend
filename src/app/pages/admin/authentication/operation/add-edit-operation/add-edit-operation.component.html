<form [formGroup]="form">
  <nz-form-item>
    <nz-form-control nzErrorTip="Operation Name is required">
      <div class="nz-float-label" [class.has-value]="form.get('operationName')?.value">
        <input nz-input placeholder=" " formControlName="operationName" />
        <label>Operation Name</label>
      </div>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-control nzErrorTip="Description is required">
      <div class="nz-float-label" [class.has-value]="form.get('description')?.value">
        <input nz-input placeholder=" " formControlName="description" />
        <label>Description</label>
      </div>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-control nzErrorTip="Authority is required">
      <div class="nz-float-label" [class.has-value]="form.get('grantedAuthority')?.value">
        <input nz-input placeholder=" " formControlName="grantedAuthority" />
        <label>Authority</label>
      </div>
    </nz-form-control>
  </nz-form-item>
</form>

<div class="modal-footer">
  <button nz-button nzType="default" (click)="modal.close()">Close</button>
  <button nz-button nzType="primary" [nzLoading]="loading" (click)="onSave()">Save</button>
</div>
