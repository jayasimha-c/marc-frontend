<nz-page-header nzTitle="Scan Results" nzBackIcon (nzBack)="navigateBack()">
</nz-page-header>

<div class="scan-result-page">
  <!-- Statistics Cards -->
  <div nz-row [nzGutter]="16" class="stats-row">
    <div nz-col nzXs="24" nzSm="12" nzMd="4">
      <nz-card nzSize="small">
        <nz-statistic nzTitle="Total Programs" [nzValue]="dashboardMetrics.totalPrograms"
                      [nzPrefix]="totalIcon"></nz-statistic>
        <ng-template #totalIcon><span nz-icon nzType="code" nzTheme="outline"></span></ng-template>
      </nz-card>
    </div>
    <div nz-col nzXs="24" nzSm="12" nzMd="4">
      <nz-card nzSize="small">
        <nz-statistic nzTitle="Violations" [nzValue]="dashboardMetrics.programsWithViolations"
                      [nzPrefix]="violationIcon" [nzValueStyle]="{ color: '#ff4d4f' }"></nz-statistic>
        <ng-template #violationIcon><span nz-icon nzType="exclamation-circle" nzTheme="outline"></span></ng-template>
      </nz-card>
    </div>
    <div nz-col nzXs="24" nzSm="12" nzMd="4">
      <nz-card nzSize="small">
        <nz-statistic nzTitle="Passed" [nzValue]="dashboardMetrics.passedPrograms"
                      [nzPrefix]="passedIcon" [nzValueStyle]="{ color: '#52c41a' }"></nz-statistic>
        <ng-template #passedIcon><span nz-icon nzType="check-circle" nzTheme="outline"></span></ng-template>
      </nz-card>
    </div>
    <div nz-col nzXs="24" nzSm="12" nzMd="4">
      <nz-card nzSize="small">
        <nz-statistic nzTitle="Total Violations" [nzValue]="dashboardMetrics.totalViolations"
                      [nzPrefix]="bugIcon" [nzValueStyle]="{ color: '#faad14' }"></nz-statistic>
        <ng-template #bugIcon><span nz-icon nzType="bug" nzTheme="outline"></span></ng-template>
      </nz-card>
    </div>
    <div nz-col nzXs="24" nzSm="12" nzMd="4">
      <nz-card nzSize="small">
        <nz-statistic nzTitle="Rules Violated" [nzValue]="dashboardMetrics.uniqueRulesViolated"
                      [nzPrefix]="auditIcon" [nzValueStyle]="{ color: '#722ed1' }"></nz-statistic>
        <ng-template #auditIcon><span nz-icon nzType="audit" nzTheme="outline"></span></ng-template>
      </nz-card>
    </div>
    <div nz-col nzXs="24" nzSm="12" nzMd="4">
      <nz-card nzSize="small">
        <nz-statistic nzTitle="System" [nzValue]="dashboardMetrics.systemName || 'N/A'"
                      [nzPrefix]="dbIcon" [nzValueStyle]="{ color: '#13c2c2' }"></nz-statistic>
        <ng-template #dbIcon><span nz-icon nzType="database" nzTheme="outline"></span></ng-template>
      </nz-card>
    </div>
  </div>

  <!-- Filter + Table -->
  <nz-card nzSize="small">
    <div class="filter-row">
      <h3 nz-typography>Program Results</h3>
      <nz-select [(ngModel)]="selectedStatusFilter" (ngModelChange)="onStatusFilterChange()" style="width: 180px;">
        <nz-option nzValue="" nzLabel="All Programs"></nz-option>
        <nz-option nzValue="VIOLATION_FOUND" nzLabel="Violated Only"></nz-option>
        <nz-option nzValue="PASSED" nzLabel="Passed Only"></nz-option>
      </nz-select>
    </div>

    <app-advanced-table
      [showColumnSettings]="true"
      storageKey="sap-abap-scanner-scan-results-scan-result-enhanced"
      [columns]="columns"
      [data]="data"
      [loading]="loading"
      [serverSide]="true"
      [totalRecords]="totalRecords"
      [actions]="actions"
      [showSearch]="true"
      [showRefresh]="true"
      [maxVisibleActions]="1"
      [defaultPageSize]="20"
      tableLayout="fixed"
      (queryParamsChange)="onQueryParamsChange($event)"
      (rowClick)="onRowClick($event)">
    </app-advanced-table>
  </nz-card>
</div>
