<nz-tabset [(nzSelectedIndex)]="activeTab">

  <!-- Tab 1: Whitelist Entries -->
  <nz-tab nzTitle="Whitelist Entries">
    <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
      <nz-input-group nzSearch nzSize="small" [nzSuffix]="searchIcon" style="width: 200px;">
        <input nz-input nzSize="small" placeholder="Search..." [formControl]="filterForm.controls['search']" />
      </nz-input-group>
      <ng-template #searchIcon><span nz-icon nzType="search"></span></ng-template>

      <nz-select nzSize="small" [formControl]="filterForm.controls['type']"
                 nzPlaceHolder="All Types" nzAllowClear style="width: 120px;">
        <nz-option *ngFor="let t of whitelistTypeOptions" [nzValue]="t.value" [nzLabel]="t.label"></nz-option>
      </nz-select>

      <nz-select nzSize="small" [formControl]="filterForm.controls['isActive']"
                 nzPlaceHolder="All Status" nzAllowClear style="width: 120px;">
        <nz-option [nzValue]="true" nzLabel="Active"></nz-option>
        <nz-option [nzValue]="false" nzLabel="Inactive"></nz-option>
      </nz-select>

      <span style="flex: 1;"></span>

      <button nz-button nzSize="small" nzType="primary" (click)="openAddModal()">
        <span nz-icon nzType="plus"></span> Add
      </button>
      <button nz-button nzSize="small" (click)="openEditModal()" [disabled]="!selectedRow">
        <span nz-icon nzType="edit"></span> Edit
      </button>
      <button nz-button nzSize="small" nzDanger (click)="deleteWhitelist()" [disabled]="!selectedRow">
        <span nz-icon nzType="delete"></span> Delete
      </button>
    </div>

    <nz-table #whitelistTable
              [nzData]="whitelistData"
              nzSize="small"
              [nzShowPagination]="whitelistData.length > 10"
              [nzPageSize]="10"
              nzTableLayout="fixed">
      <thead>
        <tr>
          <th nzWidth="40px"></th>
          <th>Name</th>
          <th nzWidth="100px">Type</th>
          <th nzWidth="120px">Field</th>
          <th nzWidth="80px">Active</th>
          <th nzWidth="160px">Created</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of whitelistTable.data"
            [class.ant-table-row-selected]="selectedRow === row"
            (click)="onWhitelistRowClick(row)"
            style="cursor: pointer;">
          <td>
            <label nz-radio [ngModel]="selectedRow === row" (ngModelChange)="onWhitelistRowClick(row)"></label>
          </td>
          <td>{{ row.name }}</td>
          <td>
            <nz-tag>{{ row.type }}</nz-tag>
          </td>
          <td>{{ row.field }}</td>
          <td>
            <nz-badge [nzStatus]="row.active ? 'success' : 'default'" [nzText]="row.active ? 'Active' : 'Inactive'"></nz-badge>
          </td>
          <td>{{ row.createdDate || row.createdAt | date:'yyyy-MM-dd HH:mm' }}</td>
        </tr>
      </tbody>
    </nz-table>
  </nz-tab>

  <!-- Tab 2: Violation Whitelists -->
  <nz-tab nzTitle="Violation Whitelists">
    <app-advanced-table
      [showColumnSettings]="true"
      storageKey="sap-abap-scanner-whitelist-management"
      [columns]="violationColumns"
      [data]="violationData"
      [loading]="violationLoading"
      [serverSide]="true"
      [totalRecords]="violationTotal"
      [showSearch]="true"
      [defaultPageSize]="20"
      tableLayout="fixed"
      (queryParamsChange)="onViolationQueryChange($event)"
      (rowClick)="onViolationRowClick($event)">
    </app-advanced-table>

    <!-- Inline Detail Table -->
    <ng-container *ngIf="showDetail">
      <nz-divider></nz-divider>
      <nz-card nzSize="small" [nzTitle]="detailTitle" [nzExtra]="detailActions">
        <ng-template #detailActions>
          <nz-space>
            <button *nzSpaceItem nz-button nzSize="small" nzDanger
                    [disabled]="!detailSelectedRow" (click)="removeFromWhitelist()">
              <span nz-icon nzType="delete"></span> Remove
            </button>
            <button *nzSpaceItem nz-button nzSize="small" (click)="closeDetail()">
              <span nz-icon nzType="close"></span> Close
            </button>
          </nz-space>
        </ng-template>

        <nz-table #detailTable
                  [nzData]="detailData"
                  nzSize="small"
                  [nzLoading]="detailLoading"
                  [nzShowPagination]="detailData.length > 10"
                  [nzPageSize]="10"
                  [nzScroll]="{ x: '1200px' }">
          <thead>
            <tr>
              <th *ngFor="let col of detailColumns" [nzWidth]="col.width || null">{{ col.header }}</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of detailTable.data"
                [class.ant-table-row-selected]="detailSelectedRow === row"
                (click)="detailSelectedRow = row"
                style="cursor: pointer;">
              <td *ngFor="let col of detailColumns">
                <ng-container [ngSwitch]="col.type">
                  <span *ngSwitchCase="'date'">{{ row[col.field] | date:'yyyy-MM-dd HH:mm' }}</span>
                  <span *ngSwitchDefault>{{ row[col.field] }}</span>
                </ng-container>
              </td>
            </tr>
          </tbody>
        </nz-table>
      </nz-card>
    </ng-container>
  </nz-tab>

</nz-tabset>

<!-- Add/Edit Modal -->
<nz-modal
  [(nzVisible)]="showAddModal"
  [nzTitle]="editingWhitelist ? 'Edit Whitelist Entry' : 'Add Whitelist Entry'"
  [nzFooter]="modalFooter"
  (nzOnCancel)="showAddModal = false"
  [nzWidth]="520">

  <ng-container *nzModalContent>
    <form [formGroup]="whitelistForm" nz-form nzLayout="vertical">
      <nz-form-item>
        <nz-form-label nzRequired>Name</nz-form-label>
        <nz-form-control nzErrorTip="Name is required">
          <input nz-input formControlName="name" placeholder="Enter whitelist name" />
        </nz-form-control>
      </nz-form-item>

      <div nz-row [nzGutter]="16">
        <div nz-col nzSpan="12">
          <nz-form-item>
            <nz-form-label nzRequired>Type</nz-form-label>
            <nz-form-control>
              <nz-select formControlName="type">
                <nz-option *ngFor="let t of whitelistTypeOptions" [nzValue]="t.value" [nzLabel]="t.label"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col nzSpan="12">
          <nz-form-item>
            <nz-form-label nzRequired>Field</nz-form-label>
            <nz-form-control>
              <nz-select formControlName="field">
                <nz-option *ngFor="let f of whitelistFieldOptions" [nzValue]="f.value" [nzLabel]="f.label"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <nz-form-item *ngIf="whitelistForm.get('type')?.value === 'PATTERN'">
        <nz-form-label>Pattern</nz-form-label>
        <nz-form-control>
          <textarea nz-input formControlName="pattern" placeholder="Enter regex pattern"
            [nzAutosize]="{ minRows: 3, maxRows: 5 }"></textarea>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item *ngIf="whitelistForm.get('type')?.value === 'LIST'">
        <nz-form-label>Values</nz-form-label>
        <nz-form-control>
          <textarea nz-input formControlName="valueList" placeholder="Enter values (one per line)"
            [nzAutosize]="{ minRows: 3, maxRows: 5 }"></textarea>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Description</nz-form-label>
        <nz-form-control>
          <textarea nz-input formControlName="description" placeholder="Enter description"
            [nzAutosize]="{ minRows: 2, maxRows: 4 }"></textarea>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control>
          <label nz-checkbox formControlName="active">Active</label>
        </nz-form-control>
      </nz-form-item>
    </form>
  </ng-container>

  <ng-template #modalFooter>
    <button nz-button (click)="showAddModal = false">Cancel</button>
    <button nz-button nzType="primary" (click)="saveWhitelist()">Save</button>
  </ng-template>
</nz-modal>
