<!-- Search -->
<nz-input-group [nzPrefix]="searchIcon" class="search-box">
  <input nz-input placeholder="Search rules by name or category..." [(ngModel)]="searchText" (ngModelChange)="onSearch()" />
</nz-input-group>
<ng-template #searchIcon><span nz-icon nzType="search" nzTheme="outline"></span></ng-template>

<!-- Table -->
<nz-table
  #ruleTable
  [nzData]="filteredRules"
  nzSize="small"
  [nzShowPagination]="true"
  [nzPageSize]="10"
  nzShowSizeChanger
  [nzPageSizeOptions]="[10, 20, 50]"
  [nzFrontPagination]="true"
  nzTableLayout="fixed">
  <thead>
    <tr>
      <th nzWidth="50px"
          [nzChecked]="allChecked"
          [nzIndeterminate]="indeterminate"
          (nzCheckedChange)="onAllChecked($event)">
      </th>
      <th>Name</th>
      <th nzWidth="140px">Category</th>
      <th nzWidth="100px">Severity</th>
      <th nzWidth="100px">Status</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let rule of ruleTable.data">
      <td [nzChecked]="checkedRules.has(rule.id)"
          (nzCheckedChange)="onItemChecked(rule.id, $event)">
      </td>
      <td nzEllipsis>{{ rule.name }}</td>
      <td>{{ rule.category || '-' }}</td>
      <td>
        <nz-tag [nzColor]="rule.severity === 'HIGH' ? 'red' : rule.severity === 'CRITICAL' ? 'magenta' : rule.severity === 'MEDIUM' ? 'orange' : 'blue'">
          {{ rule.severity || '-' }}
        </nz-tag>
      </td>
      <td>
        <nz-tag [nzColor]="rule.status === 'ACTIVE' ? 'green' : 'default'">
          {{ rule.status || '-' }}
        </nz-tag>
      </td>
    </tr>
  </tbody>
</nz-table>

<div class="modal-footer">
  <button nz-button nzType="default" (click)="onClose()">Close</button>
  <button nz-button nzType="primary" [disabled]="!hasSelection" (click)="onAdd()">
    Add Selected ({{ checkedRules.size }})
  </button>
</div>
