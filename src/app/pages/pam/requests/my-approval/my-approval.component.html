<app-page-panel header="My Approval">
    <!-- Filter Form -->
    <form nz-form [formGroup]="form" (ngSubmit)="search()" nzLayout="vertical">
        <div nz-row [nzGutter]="24">
            <div nz-col [nzSpan]="4">
                <nz-form-item>
                    <nz-form-control>
                        <input nz-input formControlName="id" placeholder="Request No" />
                    </nz-form-control>
                </nz-form-item>
            </div>

            <div nz-col [nzSpan]="4">
                <nz-form-item>
                    <nz-form-control>
                        <input nz-input formControlName="privilegeId" placeholder="Privilege ID" />
                    </nz-form-control>
                </nz-form-item>
            </div>

            <div nz-col [nzSpan]="4">
                <nz-form-item>
                    <nz-form-control>
                        <input nz-input formControlName="description" placeholder="Description" />
                    </nz-form-control>
                </nz-form-item>
            </div>

            <div nz-col [nzSpan]="4">
                <nz-form-item>
                    <nz-form-control>
                        <input nz-input formControlName="requesterName" placeholder="Requester" />
                    </nz-form-control>
                </nz-form-item>
            </div>

            <div nz-col [nzSpan]="4">
                <nz-form-item>
                    <nz-form-control>
                        <nz-date-picker formControlName="requestDate" nzPlaceHolder="Request Date"
                            style="width: 100%"></nz-date-picker>
                    </nz-form-control>
                </nz-form-item>
            </div>

            <div nz-col [nzSpan]="4">
                <nz-form-item>
                    <nz-form-control>
                        <input nz-input formControlName="sapName" placeholder="Sap Name" />
                    </nz-form-control>
                </nz-form-item>
            </div>

            <div nz-col [nzSpan]="4">
                <nz-form-item>
                    <nz-form-control>
                        <nz-date-picker formControlName="from" nzPlaceHolder="Valid From"
                            style="width: 100%"></nz-date-picker>
                    </nz-form-control>
                </nz-form-item>
            </div>

            <div nz-col [nzSpan]="4">
                <nz-form-item>
                    <nz-form-control>
                        <nz-date-picker formControlName="to" nzPlaceHolder="Valid To"
                            style="width: 100%"></nz-date-picker>
                    </nz-form-control>
                </nz-form-item>
            </div>

            <div nz-col [nzSpan]="4">
                <nz-form-item>
                    <nz-form-control>
                        <nz-select formControlName="status" nzPlaceHolder="Status" nzAllowClear style="width: 100%">
                            <nz-option *ngFor="let i of statusList" [nzValue]="i" [nzLabel]="i"></nz-option>
                        </nz-select>
                    </nz-form-control>
                </nz-form-item>
            </div>

            <div nz-col [nzSpan]="4">
                <nz-form-item>
                    <nz-form-control>
                        <input nz-input formControlName="justification" placeholder="Justification" />
                    </nz-form-control>
                </nz-form-item>
            </div>

            <div nz-col [nzSpan]="8" class="search-actions">
                <button nz-button nzType="primary" type="submit" [nzLoading]="loading">Search</button>
                <button nz-button nzType="default" type="button" (click)="resetForm()">Reset</button>
            </div>
        </div>
    </form>

    <nz-divider class="my-4"></nz-divider>

    <!-- Advanced Table -->
    <app-advanced-table [showColumnSettings]="true" storageKey="pam-requests-my-approval" [columns]="tableColumns" [data]="tableData" [loading]="loading" [totalRecords]="totalRecords"
        (paginationChange)="getTableData($event)" [customStatusTemplate]="statusTemplate"
        [customOperationsTemplate]="opsTemplate"></app-advanced-table>

</app-page-panel>

<!-- Custom Templates specifically bound to the advanced table internals -->
<ng-template #statusTemplate let-row>
    <span class="status-clickable" (click)="showRequestMessage(row)">
        <app-status-badge [status]="row.status"></app-status-badge>
    </span>
</ng-template>

<ng-template #opsTemplate let-row>
    <div class="table-operations">
        <!-- To Approve -->
        <a *ngIf="row.status === 'New'" (click)="openDetail('view', row)" nz-tooltip nzTooltipTitle="To Approve">
            <span nz-icon nzType="check-circle" nzTheme="outline" class="op-icon success"></span>
        </a>
        <nz-divider *ngIf="row.status === 'New'" nzType="vertical"></nz-divider>

        <!-- To Reset -->
        <a *ngIf="row.status === 'Error'" (click)="openDetail('reset', row)" nz-tooltip nzTooltipTitle="To Reset">
            <span nz-icon nzType="sync" nzTheme="outline" class="op-icon primary"></span>
        </a>
        <nz-divider *ngIf="row.status === 'Error'" nzType="vertical"></nz-divider>

        <!-- End Privilege ID Validity -->
        <a *ngIf="['InUse', 'Approved'].includes(row.status)" (click)="openDetail('end', row)" nz-tooltip
            nzTooltipTitle="End Privilege ID Validity">
            <span nz-icon nzType="stop" nzTheme="outline" class="op-icon danger"></span>
        </a>
    </div>
</ng-template>
