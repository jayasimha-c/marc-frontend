<app-advanced-table [showColumnSettings]="true" storageKey="pam-setup-privileges-sap-reviewer" [title]="formatType() + 's — ' + privId" [columns]="columns" [data]="data"
    [loading]="loading" [showSearch]="false" [showPagination]="false" [actions]="tableActions">
</app-advanced-table>

<ng-template #statusTpl let-row="row">
    <nz-tag [nzColor]="row.active ? 'success' : 'default'">{{ row.active ? 'Active' : 'Inactive' }}</nz-tag>
</ng-template>

<ng-template #operationsTpl let-row="row">
    <nz-space [nzSize]="4">
        <button *nzSpaceItem nz-button nzType="link" nzSize="small" nzDanger nz-tooltip="Delete" (click)="deleteUser(row)">
            <span nz-icon nzType="delete"></span>
        </button>
        <button *nzSpaceItem nz-button nzType="link" nzSize="small"
            [nz-tooltip]="row.active ? 'Deactivate' : 'Activate'" (click)="switchStatus(row)">
            <span nz-icon [nzType]="row.active ? 'stop' : 'check-circle'"></span>
        </button>
    </nz-space>
</ng-template>
