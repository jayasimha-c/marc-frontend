<app-page-panel title="Master Data" description="View and analyze all compiled privilege master records"
    icon="database">

    <nz-tabset [nzAnimated]="false" style="margin-top: 16px;">

        <nz-tab nzTitle="Table View">
            <app-advanced-table [data]="tableData" [columns]="tableColumns" [total]="totalRecord" [loading]="loading"
                [showPagination]="true" [pageSizeOptions]="[10, 25, 50, 100]" (queryParamsChange)="onTableChange($event)">
            </app-advanced-table>
        </nz-tab>

        <nz-tab nzTitle="Pivot View">
            <nz-spin [nzSpinning]="loading">
                <app-pivot-table
                    [data]="tableData"
                    aggregator="count"
                    [enableHeatmap]="true"
                    [showTotals]="true">
                </app-pivot-table>
            </nz-spin>
        </nz-tab>

    </nz-tabset>

</app-page-panel>
