<!-- File Selection -->
<div *ngIf="!selectedFile && !isUploading">
  <nz-upload [nzBeforeUpload]="beforeUpload" [nzAccept]="'.yml,.yaml'" [nzShowUploadList]="false">
    <button nz-button nzType="primary" nzSize="large" nzBlock>
      <span nz-icon nzType="cloud-upload"></span> Select YAML File
    </button>
  </nz-upload>
  <nz-alert nzType="info" nzShowIcon nzMessage="Supported formats: YAML (.yml, .yaml)"
            style="margin-top: 16px"></nz-alert>
</div>

<!-- Selected File Info -->
<div *ngIf="selectedFile && !isUploading">
  <nz-list nzBordered nzSize="small">
    <nz-list-item>
      <nz-list-item-meta>
        <nz-list-item-meta-avatar>
          <span nz-icon nzType="file-text" nzTheme="outline" style="font-size: 20px"></span>
        </nz-list-item-meta-avatar>
        <nz-list-item-meta-title>{{ selectedFile.name }}</nz-list-item-meta-title>
        <nz-list-item-meta-description>{{ cfService.formatFileSize(selectedFile.size) }}</nz-list-item-meta-description>
      </nz-list-item-meta>
      <button nz-button nzType="text" nzShape="circle" nzDanger (click)="removeFile()">
        <span nz-icon nzType="close"></span>
      </button>
    </nz-list-item>
  </nz-list>
</div>

<!-- Upload Progress -->
<div *ngIf="isUploading" style="padding: 16px 0">
  <nz-progress [nzPercent]="uploadProgress" nzStatus="active"></nz-progress>
  <p nz-typography nzType="secondary" style="text-align: center; margin-top: 8px">{{ getProgressStatus() }}</p>
</div>

<!-- Error -->
<nz-alert *ngIf="errorMessage" nzType="error" nzShowIcon [nzMessage]="errorMessage"
          style="margin-top: 16px"></nz-alert>

<!-- Success -->
<nz-alert *ngIf="successMessage" nzType="success" nzShowIcon [nzMessage]="successMessage"
          style="margin-top: 16px"></nz-alert>

<!-- Footer -->
<div class="modal-footer">
  <button nz-button nzType="default" (click)="modal.close()" [disabled]="isUploading">Close</button>
  <button nz-button nzType="primary" (click)="onImport()" [disabled]="!selectedFile || isUploading">
    {{ isUploading ? 'Importing...' : 'Import Framework' }}
  </button>
</div>
