<app-page-panel [title]="'Excel Download'">
    <div panel-content>
        <app-advanced-table [showColumnSettings]="true" storageKey="general-export-results" [data]="data" [columns]="tableColumns" [total]="totalRecords" [loading]="loading"
            [showSearch]="false" [showPagination]="true" [serverSide]="true"
            (queryParamsChange)="onQueryParamsChange($event)" (actionClick)="onRowAction($event)">
        </app-advanced-table>
    </div>
</app-page-panel>
