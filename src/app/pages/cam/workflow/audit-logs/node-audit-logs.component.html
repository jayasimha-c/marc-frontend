<app-page-panel [header]="pageTitle">

    <app-advanced-table
        title=""
        [data]="data"
        [columns]="columns"
        [totalRecords]="totalRecords"
        [loading]="loading"
        [serverSide]="true"
        [showPagination]="true"
        size="middle"
        scrollY="60vh"
        (queryParamsChange)="loadData($event)"
        (rowClick)="onRowClick($event)">
    </app-advanced-table>

    <!-- Side Panel for Change Details -->
    <app-side-panel #detailPanel
        title="Change Details"
        [subtitle]="selectedLog?.workflowName || ''"
        [icon]="getActionIcon(selectedLog?.action)"
        width="560px"
        [loading]="detailLoading">

        <div panel-content>
            <div *ngIf="selectedLog" class="audit-meta">
                <nz-descriptions [nzColumn]="1" nzBordered nzSize="small">
                    <nz-descriptions-item nzTitle="Delegation ID" *ngIf="isDelegationPage && selectedLog.delegationId">
                        {{ selectedLog.delegationId }}
                    </nz-descriptions-item>
                    <nz-descriptions-item nzTitle="Action">
                        <nz-tag [nzColor]="getActionColor(selectedLog.action)">{{ selectedLog.action }}</nz-tag>
                    </nz-descriptions-item>
                    <nz-descriptions-item nzTitle="Time">{{ selectedLog.time }}</nz-descriptions-item>
                    <nz-descriptions-item nzTitle="Workflow">{{ selectedLog.workflowName }}</nz-descriptions-item>
                    <nz-descriptions-item nzTitle="Updated By">{{ selectedLog.updatedBy }}</nz-descriptions-item>
                    <nz-descriptions-item nzTitle="Admin Update" *ngIf="isDelegationPage">
                        <nz-tag [nzColor]="selectedLog.updateByAdmin ? 'orange' : 'default'">
                            {{ selectedLog.updateByAdmin ? 'Yes' : 'No' }}
                        </nz-tag>
                    </nz-descriptions-item>
                </nz-descriptions>
            </div>

            <nz-divider nzText="Changes" nzOrientation="left"></nz-divider>

            <div *ngIf="changeDetails.length === 0 && !detailLoading" class="audit-empty">
                <nz-empty nzNotFoundContent="No property changes recorded"></nz-empty>
            </div>

            <div *ngFor="let change of changeDetails" class="audit-change-item">
                <div class="audit-change-item__name">{{ change.name }}</div>
                <div class="audit-change-item__values">
                    <div class="audit-change-value audit-change-value--before" *ngIf="change.valueBefore">
                        <span class="audit-change-value__label">Before</span>
                        <span class="audit-change-value__text">{{ change.valueBefore }}</span>
                    </div>
                    <span nz-icon nzType="arrow-right" *ngIf="change.valueBefore && change.valueAfter"
                        style="color:#bfbfbf;margin:0 8px"></span>
                    <div class="audit-change-value audit-change-value--after" *ngIf="change.valueAfter">
                        <span class="audit-change-value__label">After</span>
                        <span class="audit-change-value__text">{{ change.valueAfter }}</span>
                    </div>
                </div>
            </div>
        </div>

    </app-side-panel>

</app-page-panel>
