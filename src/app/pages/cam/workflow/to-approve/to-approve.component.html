<app-page-panel header="Requests to Approve">

    <app-advanced-table
        [showColumnSettings]="true"
        storageKey="cam-workflow-to-approve"
        title=""
        [data]="data"
        [columns]="columns"
        [totalRecords]="totalRecords"
        [loading]="loading"
        [serverSide]="true"
        [showPagination]="true"
        size="middle"
        scrollY="60vh"
        (queryParamsChange)="loadData($event)">
    </app-advanced-table>

</app-page-panel>
