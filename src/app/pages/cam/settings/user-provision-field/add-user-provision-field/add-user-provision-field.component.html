<form nz-form nzLayout="vertical" [formGroup]="form">
  <nz-form-item>
    <nz-form-label nzRequired>Name</nz-form-label>
    <nz-form-control nzErrorTip="Please select a field name">
      <nz-select formControlName="name" nzPlaceHolder="Select Field" nzShowSearch>
        <nz-option *ngFor="let f of fields" [nzValue]="f" [nzLabel]="f"></nz-option>
      </nz-select>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzRequired>Description</nz-form-label>
    <nz-form-control nzErrorTip="Please enter a description">
      <input nz-input formControlName="description" placeholder="Enter description" />
    </nz-form-control>
  </nz-form-item>

  <label nz-checkbox formControlName="isActive">Is Active?</label>
</form>

<div nz-row nzJustify="end" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #f0f0f0;">
  <button nz-button nzType="default" (click)="modalRef.close()" style="margin-right: 8px;">Close</button>
  <button nz-button nzType="primary" (click)="save()">Save</button>
</div>
