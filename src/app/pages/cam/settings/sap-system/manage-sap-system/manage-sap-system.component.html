<form nz-form nzLayout="vertical" [formGroup]="form">

  <!-- Set Password Rule -->
  <ng-container *ngIf="formType === 'Set Password Rule'">
    <div nz-row [nzGutter]="16">
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzRequired>Length</nz-form-label>
          <nz-form-control nzErrorTip="Required">
            <nz-input-number formControlName="length" [nzMin]="0" style="width: 100%"></nz-input-number>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzRequired>Min Lower Char</nz-form-label>
          <nz-form-control nzErrorTip="Required">
            <nz-input-number formControlName="minLowerChar" [nzMin]="0" style="width: 100%"></nz-input-number>
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>

    <div nz-row [nzGutter]="16">
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzRequired>Min Upper Char</nz-form-label>
          <nz-form-control nzErrorTip="Required">
            <nz-input-number formControlName="minUpperChar" [nzMin]="0" style="width: 100%"></nz-input-number>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzRequired>Min Number</nz-form-label>
          <nz-form-control nzErrorTip="Required">
            <nz-input-number formControlName="minNumber" [nzMin]="0" style="width: 100%"></nz-input-number>
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>

    <nz-form-item>
      <nz-form-label nzRequired>Min Special Char</nz-form-label>
      <nz-form-control nzErrorTip="Required">
        <nz-input-number formControlName="minSpecialChar" [nzMin]="0" style="width: 100%"></nz-input-number>
      </nz-form-control>
    </nz-form-item>
  </ng-container>

  <!-- Set System Order -->
  <ng-container *ngIf="formType === 'Set System Order'">
    <nz-form-item>
      <nz-form-label nzRequired>Order</nz-form-label>
      <nz-form-control nzErrorTip="Please enter a system order">
        <nz-input-number formControlName="order" [nzMin]="0" style="width: 100%"></nz-input-number>
      </nz-form-control>
    </nz-form-item>
  </ng-container>

  <!-- Set Risk Variant -->
  <ng-container *ngIf="formType === 'Set Risk Variant'">
    <nz-form-item>
      <nz-form-label nzRequired>Variant</nz-form-label>
      <nz-form-control nzErrorTip="Please select a variant">
        <nz-select formControlName="variant" nzPlaceHolder="Select Variant" nzShowSearch>
          <nz-option *ngFor="let v of riskVariantList" [nzValue]="v.id" [nzLabel]="v.description"></nz-option>
        </nz-select>
      </nz-form-control>
    </nz-form-item>
  </ng-container>

</form>

<div nz-row nzJustify="end" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #f0f0f0;">
  <button nz-button nzType="default" (click)="modalRef.close()" style="margin-right: 8px;">Close</button>
  <button nz-button nzType="primary" (click)="save()">Save</button>
</div>
