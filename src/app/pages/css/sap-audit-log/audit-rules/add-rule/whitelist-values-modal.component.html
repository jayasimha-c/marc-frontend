<div class="row">
  <nz-form-item class="w-full">
    <nz-form-control>
      <textarea class="w-full h-full" nz-input readonly [value]="data.values" placeholder="No values available"
        [nzAutosize]="{ minRows: 5, maxRows: 15 }">
      </textarea>
    </nz-form-control>
  </nz-form-item>
</div>

<div class="flex justify-end gap-3 mt-4 pt-4 border-t">
  <button nz-button nzType="default" (click)="modal.close()">Close</button>
</div>
