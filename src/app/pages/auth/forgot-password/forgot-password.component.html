<div class="auth-container">
  <nz-card class="auth-card">
    <div class="auth-header">
      <h1>Forgot Password</h1>
      <p>Enter your details to receive reset instructions</p>
    </div>

    <nz-result *ngIf="sent" nzStatus="success" nzTitle="Email Sent" nzSubTitle="Check your inbox for password reset instructions.">
      <div nz-result-extra>
        <button nz-button nzType="primary" routerLink="/sign-in">Back to Sign In</button>
      </div>
    </nz-result>

    <form *ngIf="!sent" nz-form [formGroup]="form" (ngSubmit)="submit()" nzLayout="vertical">
      <nz-form-item>
        <nz-form-label nzFor="username">Username</nz-form-label>
        <nz-form-control nzErrorTip="Please enter your username">
          <nz-input-group nzPrefixIcon="user" nzSize="large">
            <input nz-input formControlName="username" placeholder="Enter username" />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzFor="email">Email</nz-form-label>
        <nz-form-control nzErrorTip="Please enter a valid email">
          <nz-input-group nzPrefixIcon="mail" nzSize="large">
            <input nz-input formControlName="email" placeholder="Enter email" />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <button nz-button nzType="primary" nzSize="large" nzBlock [nzLoading]="loading" type="submit">Send Reset Link</button>

      <div style="text-align: center; margin-top: 16px;">
        <a routerLink="/sign-in">Back to Sign In</a>
      </div>
    </form>
  </nz-card>
</div>
