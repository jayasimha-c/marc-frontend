<div class="auth-container">
  <nz-card class="auth-card">
    <div class="auth-header">
      <h1>Password Reset</h1>
    </div>

    <!-- Processing spinner -->
    <div *ngIf="isProcessing" style="text-align: center; padding: 24px 0;">
      <nz-spin nzSimple nzTip="Processing your reset request..."></nz-spin>
    </div>

    <!-- Result -->
    <ng-container *ngIf="tokenProcessed">
      <nz-alert
        [nzType]="alertType"
        [nzMessage]="alertMessage"
        nzShowIcon
        style="margin-bottom: 24px;">
      </nz-alert>

      <button *ngIf="alertType === 'success'" nz-button nzType="primary" nzSize="large" nzBlock routerLink="/sign-in">
        Go to Sign In
      </button>

      <div *ngIf="alertType === 'error'" style="text-align: center; margin-top: 16px;">
        <a routerLink="/sign-in">Return to sign in</a>
        <nz-divider nzType="vertical"></nz-divider>
        <a routerLink="/forgot-password">Request new reset link</a>
      </div>
    </ng-container>
  </nz-card>
</div>
