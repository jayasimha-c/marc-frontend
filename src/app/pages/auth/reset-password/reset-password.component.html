<div class="auth-container">
    <nz-card class="auth-card">
        <div class="auth-header">
            <h1>Reset Password</h1>
            <p>Create a new password for your account</p>
        </div>

        <form nz-form [formGroup]="form" (ngSubmit)="submit()" nzLayout="vertical">
            <nz-form-item>
                <nz-form-label nzFor="password">New Password</nz-form-label>
                <nz-form-control nzErrorTip="Password is required (min 8 characters)">
                    <nz-input-group nzPrefixIcon="lock" nzSize="large" [nzSuffix]="suffixTemplate1">
                        <input nz-input formControlName="password" [type]="hidePassword ? 'password' : 'text'"
                            placeholder="Enter new password" />
                    </nz-input-group>
                    <ng-template #suffixTemplate1>
                        <span nz-icon [nzType]="hidePassword ? 'eye-invisible' : 'eye'"
                            (click)="hidePassword = !hidePassword" style="cursor: pointer;"></span>
                    </ng-template>
                </nz-form-control>
            </nz-form-item>

            <nz-form-item>
                <nz-form-label nzFor="passwordConfirm">Confirm Password</nz-form-label>
                <nz-form-control nzErrorTip="Please confirm your password">
                    <nz-input-group nzPrefixIcon="lock" nzSize="large" [nzSuffix]="suffixTemplate2">
                        <input nz-input formControlName="passwordConfirm"
                            [type]="hidePasswordConfirm ? 'password' : 'text'" placeholder="Confirm new password" />
                    </nz-input-group>
                    <ng-template #suffixTemplate2>
                        <span nz-icon [nzType]="hidePasswordConfirm ? 'eye-invisible' : 'eye'"
                            (click)="hidePasswordConfirm = !hidePasswordConfirm" style="cursor: pointer;"></span>
                    </ng-template>
                </nz-form-control>
            </nz-form-item>

            <button nz-button nzType="primary" nzSize="large" nzBlock [nzLoading]="loading" type="submit">Reset
                Password</button>

            <div style="text-align: center; margin-top: 16px;">
                Return to <a routerLink="/sign-in">Sign in</a>
            </div>
        </form>
    </nz-card>
</div>
