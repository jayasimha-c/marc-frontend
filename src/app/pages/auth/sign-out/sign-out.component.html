<div class="auth-container">
  <nz-card class="auth-card" style="width: 480px;">

    <!-- Loading state -->
    <div *ngIf="!signedOut" style="text-align: center; padding: 40px 0;">
      <nz-spin nzSimple nzTip="Signing out..."></nz-spin>
    </div>

    <!-- Signed out state -->
    <ng-container *ngIf="signedOut">
      <div class="auth-header">
        <h1>Signed Out</h1>
      </div>

      <!-- Session summary -->
      <nz-descriptions nzBordered nzSize="small" [nzColumn]="1" style="margin-bottom: 24px;">
        <nz-descriptions-item nzTitle="Login Time">{{ loginTime }}</nz-descriptions-item>
        <nz-descriptions-item nzTitle="Session Duration">{{ sessionDuration }}</nz-descriptions-item>
      </nz-descriptions>

      <!-- Countdown -->
      <div style="text-align: center; margin-bottom: 24px;" *ngIf="!isPaused">
        <nz-progress
          [nzPercent]="countdownPercent"
          nzType="circle"
          [nzWidth]="80"
          [nzFormat]="countdownFormat">
        </nz-progress>
        <ng-template #countdownFormat let-percent>
          <span style="font-size: 20px; font-weight: 600;">{{ countdown }}</span>
        </ng-template>
        <p style="color: #8c8c8c; font-size: 13px; margin-top: 8px;">
          Redirecting to sign in...
        </p>
      </div>

      <!-- Paused message -->
      <div *ngIf="isPaused" style="text-align: center; margin-bottom: 24px;">
        <span style="color: #8c8c8c; font-size: 13px;">Redirect cancelled</span>
      </div>

      <!-- Actions -->
      <div style="display: flex; gap: 8px;">
        <button nz-button nzBlock nzType="primary" nzSize="large" (click)="goToSignIn()">
          Sign In Again
        </button>
        <button nz-button nzSize="large" (click)="cancelRedirect()" *ngIf="!isPaused && countdown > 0">
          Cancel
        </button>
      </div>
    </ng-container>
  </nz-card>
</div>
