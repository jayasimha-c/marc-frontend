<div class="auth-container">
    <nz-card class="auth-card">
        <div class="auth-header">
            <h1>Confirmation Required</h1>
        </div>

        <nz-result nzStatus="info" nzTitle="Check Your Email"
            nzSubTitle="A confirmation link with instructions has been sent to your email address. Follow those instructions to confirm your email address and activate your account.">
            <div nz-result-extra>
                <button nz-button nzType="primary" routerLink="/sign-in">Return to Sign In</button>
            </div>
        </nz-result>
    </nz-card>
</div>
