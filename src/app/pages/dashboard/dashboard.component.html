<nz-page-header nzTitle="Risk Analysis Dashboard" nzSubtitle="Overview of your GRC landscape">
  <nz-page-header-extra>
    <nz-space>
      <button *nzSpaceItem nz-button nzType="primary">
        <span nz-icon nzType="sync"></span>
        Refresh
      </button>
    </nz-space>
  </nz-page-header-extra>
</nz-page-header>

<!-- Statistics Cards -->
<div nz-row [nzGutter]="[16, 16]">
  <div nz-col [nzXs]="24" [nzSm]="12" [nzMd]="6" *ngFor="let stat of stats">
    <nz-card class="stat-card" [nzBordered]="true" [style.border-left]="'3px solid ' + stat.color">
      <nz-spin [nzSpinning]="loading">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <div>
            <div class="stat-label">{{ stat.title }}</div>
            <div class="stat-value" [style.color]="stat.color">{{ stat.value | number }}</div>
          </div>
          <nz-avatar [nzSize]="48" [nzIcon]="stat.icon" [style.background-color]="stat.bg" [style.color]="stat.color"></nz-avatar>
        </div>
      </nz-spin>
    </nz-card>
  </div>
</div>

<!-- Charts Row -->
<div nz-row [nzGutter]="[16, 16]" style="margin-top: 16px;">
  <div nz-col [nzXs]="24" [nzLg]="12">
    <nz-card nzTitle="Risk Distribution by Category" [nzExtra]="chartExtra1">
      <div style="height: 300px; display: flex; align-items: center; justify-content: center;">
        <nz-empty nzNotFoundContent="Chart will be rendered here" [nzNotFoundImage]="'simple'"></nz-empty>
      </div>
    </nz-card>
    <ng-template #chartExtra1>
      <a nz-button nzType="link" nzSize="small">View Details</a>
    </ng-template>
  </div>

  <div nz-col [nzXs]="24" [nzLg]="12">
    <nz-card nzTitle="Violation Trend" [nzExtra]="chartExtra2">
      <div style="height: 300px; display: flex; align-items: center; justify-content: center;">
        <nz-empty nzNotFoundContent="Chart will be rendered here" [nzNotFoundImage]="'simple'"></nz-empty>
      </div>
    </nz-card>
    <ng-template #chartExtra2>
      <a nz-button nzType="link" nzSize="small">View Details</a>
    </ng-template>
  </div>
</div>

<!-- Recent Analyses Table -->
<nz-card nzTitle="Recent Risk Analyses" style="margin-top: 16px;" [nzExtra]="tableExtra">
  <nz-table #analysisTable [nzData]="recentAnalyses" [nzLoading]="loading" nzSize="middle" [nzPageSize]="10" [nzShowSizeChanger]="true">
    <thead>
      <tr>
        <th nzWidth="60px">#</th>
        <th>System</th>
        <th>Analysis Type</th>
        <th>Status</th>
        <th nzWidth="120px">Date</th>
        <th nzWidth="120px" nzAlign="right">Violations</th>
        <th nzWidth="100px" nzAlign="center">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of analysisTable.data">
        <td>{{ item.id }}</td>
        <td>
          <strong>{{ item.system }}</strong>
        </td>
        <td>{{ item.type }}</td>
        <td>
          <nz-tag [nzColor]="getStatusColor(item.status)">{{ item.status }}</nz-tag>
        </td>
        <td>{{ item.date }}</td>
        <td nzAlign="right">
          <nz-badge [nzCount]="item.violations" [nzOverflowCount]="999" [nzStyle]="{ backgroundColor: item.violations > 50 ? '#f5222d' : item.violations > 20 ? '#faad14' : '#52c41a' }"></nz-badge>
        </td>
        <td nzAlign="center">
          <a nz-button nzType="link" nzSize="small">
            <span nz-icon nzType="eye" nzTheme="outline"></span>
          </a>
          <a nz-button nzType="link" nzSize="small">
            <span nz-icon nzType="download" nzTheme="outline"></span>
          </a>
        </td>
      </tr>
    </tbody>
  </nz-table>
</nz-card>
<ng-template #tableExtra>
  <button nz-button nzType="primary" nzSize="small">
    <span nz-icon nzType="plus"></span>
    New Analysis
  </button>
</ng-template>
