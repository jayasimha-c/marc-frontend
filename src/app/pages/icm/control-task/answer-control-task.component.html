<div style="padding: 16px;">
  <!-- Header -->
  <nz-card style="margin-bottom: 16px;">
    <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <button nz-button nzType="text" nzShape="circle" (click)="goBack()"
          nz-tooltip nzTooltipTitle="Back">
          <span nz-icon nzType="arrow-left" nzTheme="outline"></span>
        </button>
        <div>
          <h3 style="margin: 0;">Answer Control Task</h3>
          <small *ngIf="wizardManualScript">
            {{ wizardManualScript?.icmControl?.name }} &mdash;
            {{ wizardManualScript?.script?.icmManualScript?.scriptName }}
          </small>
        </div>
      </div>
      <div style="display: flex; gap: 8px;">
        <button nz-button nzType="default" (click)="draftSave()" [nzLoading]="saving">
          <span nz-icon nzType="save" nzTheme="outline"></span>
          Save Draft
        </button>
        <button nz-button nzType="primary" (click)="save()" [nzLoading]="saving">
          <span nz-icon nzType="check-circle" nzTheme="outline"></span>
          Complete
        </button>
      </div>
    </div>
  </nz-card>

  <!-- Loading -->
  <nz-card *ngIf="loading" style="text-align: center; padding: 40px 0;">
    <nz-spin nzSimple></nz-spin>
    <p style="margin-top: 16px; color: rgba(0,0,0,0.45);">Loading task data...</p>
  </nz-card>

  <!-- Step Grid -->
  <app-ms-step-grid
    *ngIf="!loading && stepData.length > 0"
    #stepGrid
    [steps]="stepData"
    (stepChange)="onStepChange($event)"
    (attachmentUpload)="onAttachmentUpload($event)"
    (attachmentDownload)="onAttachmentDownload($event)"
    (attachmentRemove)="onAttachmentRemove($event)">
  </app-ms-step-grid>

  <!-- Empty State -->
  <nz-card *ngIf="!loading && stepData.length === 0">
    <nz-empty nzNotFoundContent="No steps found for this task"></nz-empty>
  </nz-card>
</div>
