<div>
    <nz-alert nzType="info" [nzMessage]="getMessage()" nzShowIcon style="margin-bottom: 24px;">
    </nz-alert>

    <nz-row [nzGutter]="[16, 16]">
        <nz-col [nzSpan]="24">
            <nz-form-item style="margin-bottom: 8px;">
                <nz-form-label [nzSpan]="24" nzFor="passwordLength" style="padding: 0; text-align: left;">
                    Password Length
                </nz-form-label>
                <nz-form-control>
                    <nz-row nzAlign="middle" [nzGutter]="16">
                        <nz-col [nzSpan]="16">
                            <nz-slider [(ngModel)]="options.length" (ngModelChange)="onLengthChange($event)" [nzMin]="8"
                                [nzMax]="64"></nz-slider>
                        </nz-col>
                        <nz-col [nzSpan]="8">
                            <nz-input-number [(ngModel)]="options.length" [nzMin]="8" [nzMax]="64"
                                (ngModelChange)="onLengthChange($event)" style="width: 100%;">
                            </nz-input-number>
                        </nz-col>
                    </nz-row>
                </nz-form-control>
            </nz-form-item>
        </nz-col>

        <nz-col [nzSpan]="24">
            <h4 nz-typography>Character Types</h4>
            <nz-row [nzGutter]="[16, 8]">
                <nz-col [nzSpan]="12">
                    <label nz-checkbox [(ngModel)]="options.includeUppercase" (ngModelChange)="onOptionChange()">
                        Uppercase (A-Z)
                    </label>
                </nz-col>
                <nz-col [nzSpan]="12">
                    <label nz-checkbox [(ngModel)]="options.includeLowercase" (ngModelChange)="onOptionChange()">
                        Lowercase (a-z)
                    </label>
                </nz-col>
                <nz-col [nzSpan]="12">
                    <label nz-checkbox [(ngModel)]="options.includeDigits" (ngModelChange)="onOptionChange()">
                        Digits (0-9)
                    </label>
                </nz-col>
                <nz-col [nzSpan]="12">
                    <label nz-checkbox [(ngModel)]="options.includeSymbols" (ngModelChange)="onOptionChange()">
                        Symbols (&#64;#$%)
                    </label>
                </nz-col>
            </nz-row>
        </nz-col>

        <nz-col [nzSpan]="24" style="margin-top: 16px;">
            <nz-card nzSize="small" [nzBordered]="true" style="background-color: #fafafa;">
                <nz-row nzAlign="middle" nzJustify="space-between">
                    <nz-col>
                        <h3 nz-typography style="margin-bottom: 0px; font-family: monospace; letter-spacing: 2px;">
                            {{ showPassword ? generatedPassword : '•'.repeat(generatedPassword.length) }}
                        </h3>
                        <nz-tag [nzColor]="getStrengthColor()" style="margin-top: 4px;">{{ getStrengthLabel()
                            }}</nz-tag>
                    </nz-col>
                    <nz-col>
                        <nz-space>
                            <button *nzSpaceItem nz-button nzType="text" nzShape="circle"
                                (click)="toggleShowPassword()">
                                <span nz-icon [nzType]="showPassword ? 'eye-invisible' : 'eye'"></span>
                            </button>
                            <button *nzSpaceItem nz-button nzType="text" nzShape="circle" (click)="copyPassword()"
                                nzTooltipTitle="Copy" nz-tooltip>
                                <span nz-icon nzType="copy"></span>
                            </button>
                            <button *nzSpaceItem nz-button nzType="text" nzShape="circle" (click)="generatePassword()"
                                nzTooltipTitle="Refresh" nz-tooltip>
                                <span nz-icon nzType="sync"></span>
                            </button>
                        </nz-space>
                    </nz-col>
                </nz-row>
            </nz-card>
        </nz-col>
    </nz-row>

    <div *nzModalFooter>
        <button nz-button nzType="default" (click)="cancel()">Cancel</button>
        <button nz-button nzType="primary" (click)="confirm()" [disabled]="!generatedPassword">
            {{ data.operationType === 'reset' ? 'Reset Password' : 'Deactivate Password' }}
        </button>
    </div>
</div>
